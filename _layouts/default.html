<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    const btn = document.getElementById('theme-toggle');
    const darkClass = 'dark';

function setTheme(dark) {
  document.documentElement.classList.toggle(darkClass, dark);
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  if (btn) btn.textContent = dark ? '☀️' : '🌙';
}

if (btn) {
  btn.addEventListener('click', () => {
    setTheme(!document.documentElement.classList.contains(darkClass));
  });
}

// установить тему при загрузке (для смены иконки)
if (localStorage.getItem('theme') === 'dark') setTheme(true);

  </script>
</head>

<header class="site-header">
  <a class="site-title">{{ site.title }}</a>
  <button id="theme-toggle" aria-label="Переключить тему">🌙</button>
</header>

<body>
  <main class="container">
    {{ content }}
  </main>
</body>
</html>
