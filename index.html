---
layout: default
title: Главная
---

<header class="header">
  <h1>{{ site.title }}</h1>
  <button id="theme-toggle" aria-label="Переключить тему">🌙</button>
  <input type="search" id="search-input" placeholder="Поиск...">
</header>

<div id="posts-list">
  {% for post in site.posts %}
  <article class="post" data-title="{{ post.title | escape }}" data-description="{{ post.description | escape }}">
    <a href="{{ post.url }}">
      <h2>{{ post.title }}</h2>
    </a>
    <time>{{ post.date | date: "%d.%m.%Y" }}</time>
    <p>{{ post.description }}</p>
  </article>
  {% endfor %}
</div>
